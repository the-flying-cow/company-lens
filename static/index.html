<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompanyLens | AI Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0ea5e9;
            --linkedin-blue: #0077b5;
            --bg-gradient: linear-gradient(135deg, #bae6fd 0%, #e0f2fe 50%, #f8fafc 100%);
            --card-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            color: #1e293b; 
            margin: 0; 
            padding: 40px 20px; 
            line-height: 1.6; 
            min-height: 100vh;
        }

        .container { max-width: 850px; margin: 0 auto; width: 100%; }
        
        header { text-align: center; margin-bottom: 50px; }
        h1 { 
            font-size: 42px; 
            font-weight: 800; 
            margin: 0; 
            letter-spacing: -0.05em; 
            color: #0f172a;
        }
        h1 span { color: var(--primary-blue); }
        p.subtitle { color: #475569; font-size: 16px; margin-top: 4px; font-weight: 500; }
        
        .input-row { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 40px; 
            flex-wrap: wrap; 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        input { 
            border: 1px solid #cbd5e1; 
            padding: 12px 16px; 
            border-radius: 10px; 
            font-size: 14px; 
            flex: 1; 
            min-width: 180px; 
            outline: none; 
            transition: all 0.2s;
            background: white;
        }
        input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1); }
        
        button { 
            background: #0f172a; 
            color: #fff; 
            border: none; 
            padding: 12px 28px; 
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 14px; 
            transition: all 0.2s;
        }
        button:hover { background: var(--primary-blue); transform: translateY(-1px); }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        .results-area { display: flex; flex-direction: column; gap: 24px; width: 100%; }
        
        .section { 
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            border-top: 5px solid var(--primary-blue);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        /* Specific accent for Role Agent */
        .section.role-agent { border-top-color: var(--linkedin-blue); }

        .section-label { 
            font-size: 12px; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: var(--primary-blue); 
            letter-spacing: 0.1em; 
            margin-bottom: 18px; 
            display: block; 
        }
        
        .content { font-size: 15.5px; color: #334155; }
        .content b { color: #0f172a; display: block; margin-top: 14px; font-weight: 700; }
        
        /* LinkedIn Profile Tags */
        .profile-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #e2e8f0;
        }

        .profile-link {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--linkedin-blue);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .profile-link:hover {
            background: var(--linkedin-blue);
            color: white;
            transform: translateY(-2px);
        }

        #loading { 
            display: none; 
            font-size: 14px; 
            color: #0369a1; 
            margin-bottom: 30px; 
            text-align: center;
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .calendar-container { text-align: center; margin-top: 20px; padding-bottom: 40px; }
        .calendar-link { 
            display: inline-block; 
            background: #0f172a;
            color: white; 
            font-weight: 700; 
            text-decoration: none; 
            padding: 14px 32px; 
            border-radius: 12px; 
            font-size: 15px; 
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.3);
        }
        .calendar-link:hover { background: var(--primary-blue); transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Company<span>Lens</span></h1>
            <p class="subtitle">Deep company research and interview prep agent</p>
        </header>

        <div class="input-row">
            <input type="text" id="company" placeholder="Company Name">
            <input type="text" id="role" placeholder="Target Role">
            <input type="date" id="date">
            <button onclick="execute()" id="btn">Analyze</button>
        </div>

        <div id="loading">Gathering intelligence from parallel agent swarms...</div>
        <div class="results-area" id="output"></div>
    </div>

    <script>
        async function execute() {
            const btn = document.getElementById('btn');
            const output = document.getElementById('output');
            const loading = document.getElementById('loading');
            
            const payload = {
                company_name: document.getElementById('company').value,
                target_role: document.getElementById('role').value,
                interview_date: document.getElementById('date').value
            };

            if(!payload.company_name || !payload.interview_date) return;

            btn.disabled = true;
            loading.style.display = "block";
            output.innerHTML = "";

            try {
                const response = await fetch('/research', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                if (data.insights) {
                    Object.entries(data.insights).forEach(([agent, result]) => {
                        let contentHtml = "";
                        let extraHtml = "";

                        if (result.status === "success" && typeof result.data === 'string') {
                            let text = result.data;

                            // SPECIAL HANDLING FOR ROLE AGENT: Parse LinkedIn Links
                            if (agent === "Role_Agent") {
                                const linkedinRegex = /(https?:\/\/(www\.)?linkedin\.com\/in\/[^\s\)]+)/g;
                                const matches = text.match(linkedinRegex);
                                
                                if (matches) {
                                    // Remove links from text to keep it clean
                                    text = text.replace(linkedinRegex, '').trim();
                                    extraHtml = `<div class="profile-container">` + 
                                        matches.map((url, i) => `
                                            <a href="${url}" target="_blank" class="profile-link">
                                                <i class="fab fa-linkedin"></i> Profile ${i+1}
                                            </a>
                                        `).join('') + `</div>`;
                                }
                            }

                            const formatted = text
                                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                                .replace(/\n/g, '<br>');
                            
                            contentHtml = `<div class="content">${formatted}${extraHtml}</div>`;
                        } else if (result.status === "success") {
                            contentHtml = `<div class="content">${JSON.stringify(result.data)}</div>`;
                        } else {
                            contentHtml = `<div class="content" style="color: #e11d48;">⚠️ ${result.message}</div>`;
                        }

                        const agentClass = agent === "Role_Agent" ? "section role-agent" : "section";
                        
                        output.innerHTML += `
                            <div class="${agentClass}">
                                <span class="section-label">${agent.replace('_', ' ')} Intelligence</span>
                                ${contentHtml}
                            </div>
                        `;
                    });
                }

                if(data.mcp_log && data.mcp_log.includes("http")) {
                    const urlMatch = data.mcp_log.match(/https?:\/\/[^\s]+/);
                    if (urlMatch) {
                        output.innerHTML += `
                            <div class="calendar-container">
                                <a href="${urlMatch[0]}" target="_blank" class="calendar-link">📅 Schedule Prep Session</a>
                            </div>`;
                    }
                }
            } catch (e) {
                output.innerHTML = "<div class='section'>System error. Check backend logs.</div>";
            }
            btn.disabled = false;
            loading.style.display = "none";
        }
    </script>
</body>
</html>
